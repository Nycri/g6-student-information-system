<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Schedule | Student Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet"  th:href="@{/assets/css/variables.css}" href="../../static/assets/css/variables.css">
    <link rel="stylesheet"  th:href="@{/assets/css/global.css}" href="../../static/assets/css/global.css">
    <link rel="stylesheet"  th:href="@{/assets/css/sidebar.css}" href="../../static/assets/css/sidebar.css">
    <link rel="stylesheet"  th:href="@{/assets/css/navbar.css}" href="../../static/assets/css/navbar.css">
    <link rel="stylesheet"  th:href="@{/assets/css/responsive.css}" href="../../static/assets/css/responsive.css">
    <link rel="stylesheet"  th:href="@{/assets/css/tables.css}" href="../../static/assets/css/tables.css">
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-brand d-flex align-items-center justify-content-center">
            <i class="bi bi-backpack-fill me-2" style="color: var(--accent);"></i> 
            <span class="sidebar-brand-text">SIS Student</span>
        </div>
        <div class="sidebar-nav mt-3">
            <a href="dashboard.html" class="sidebar-link"><i class="bi bi-speedometer2"></i> <span class="sidebar-link-text">Dashboard</span></a>
            <a href="profile.html" class="sidebar-link"><i class="bi bi-person-circle"></i> <span class="sidebar-link-text">My Profile</span></a>
            <a href="enrollment.html" class="sidebar-link"><i class="bi bi-card-checklist"></i> <span class="sidebar-link-text">Course Enrollment</span></a>
            <a href="grades.html" class="sidebar-link"><i class="bi bi-award"></i> <span class="sidebar-link-text">My Grades</span></a>
            <a href="schedule.html" class="sidebar-link active"><i class="bi bi-calendar-week"></i> <span class="sidebar-link-text">My Schedule</span></a>
        </div>
    </div>

    <div class="top-navbar">
        <div class="d-flex align-items-center">
            <i class="bi bi-list" id="sidebarToggle"></i>
            <h5 class="mb-0 ms-3 fw-semibold text-dark d-none d-md-block">Student Portal</h5>
        </div>
        <div class="dropdown">
            <a href="#" class="d-flex align-items-center text-decoration-none text-dark dropdown-toggle" id="studentProfileDropdown" data-bs-toggle="dropdown" aria-expanded="false">
                <img src="https://ui-avatars.com/api/?name=Anna+Smith&background=F59E0B&color=fff" class="rounded-circle me-2" width="40" height="40">
                <span class="d-none d-sm-inline fw-medium">Anna Smith</span>
            </a>
            <ul class="dropdown-menu dropdown-menu-end shadow border-0 mt-2">
                <li><a class="dropdown-item" href="profile.html"><i class="bi bi-person me-2"></i> Profile</a></li>
                <li><hr class="dropdown-divider"></li>
                <li><a class="dropdown-item text-danger" href="../auth/index.html"><i class="bi bi-box-arrow-right me-2"></i> Logout</a></li>
            </ul>
        </div>
    </div>

    <div class="main-content">
        <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">
            <div>
                <h3 class="fw-bold text-dark mb-1">My Schedule</h3>
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb mb-0">
                        <li class="breadcrumb-item"><a href="dashboard.html" class="text-muted text-decoration-none">Home</a></li>
                        <li class="breadcrumb-item active">My Schedule</li>
                    </ol>
                </nav>
            </div>
            
        </div>

        <div class="row g-4">
            <div class="col-12">
                <div class="table-wrapper">
                    <div class="p-3 bg-white border-bottom d-flex justify-content-between align-items-center flex-wrap gap-2">
                        <h6 class="fw-bold text-dark mb-0">Weekly Class Schedule</h6>
                        <div class="d-flex gap-2">
                            <span class="badge bg-light text-dark border">Semester: 1st</span>
                            <span class="badge bg-success bg-opacity-10 text-success border border-success border-opacity-25">Current Term</span>
                        </div>
                    </div>
                    <div class="table-responsive">
                        <table class="table table-custom mb-0">
                            <thead>
                                <tr>
                                    <th>Day</th>
                                    <th>Time</th>
                                    <th>Subject</th>
                                    <th>Instructor</th>
                                    <th>Room</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr><td colspan="5" class="text-center text-muted">Loading schedule...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script  th:src="@{/assets/js/sidebar.js}" src="../../static/assets/js/sidebar.js"></script>
    
    <script>
        $(document).ready(function() {
            const user = JSON.parse(localStorage.getItem('user'));
            if (!user) return;

            $.ajax({
                url: '/api/student/' + user.id + '/schedule',
                type: 'GET',
                success: function(schedules) {
                    const tbody = $('.table-custom tbody');
                    tbody.empty();

                    if (schedules.length === 0) {
                        tbody.append('<tr><td colspan="5" class="text-center text-muted">You are not enrolled in any classes yet.</td></tr>');
                        return;
                    }

                    schedules.forEach(function(sched) {
                        const teacherName = sched.faculty ? sched.faculty.firstName + ' ' + sched.faculty.lastName : 'TBA';
                        tbody.append(`
                            <tr>
                                <td class="fw-semibold text-dark">${sched.dayOfWeek}</td>
                                <td><span class="badge bg-light text-dark border"><i class="bi bi-clock me-1"></i> ${sched.startTime} - ${sched.endTime}</span></td>
                                <td>
                                    <div class="fw-bold text-dark">${sched.subject.subjectCode}</div>
                                    <div class="small text-muted">${sched.subject.description} (Units: ${sched.subject.units})</div>
                                </td>
                                <td>${teacherName}</td>
                                <td>${sched.room}</td>
                            </tr>
                        `);
                    });
                }
            });
        });
    </script>
</body>
</html>
