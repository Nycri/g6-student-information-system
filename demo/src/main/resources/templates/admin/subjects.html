<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subject Management | Admin Portal</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/assets/css/variables.css}" href="../../static/assets/css/variables.css">
    <link rel="stylesheet" th:href="@{/assets/css/global.css}" href="../../static/assets/css/global.css">
    <link rel="stylesheet" th:href="@{/assets/css/sidebar.css}" href="../../static/assets/css/sidebar.css">
    <link rel="stylesheet" th:href="@{/assets/css/navbar.css}" href="../../static/assets/css/navbar.css">
    <link rel="stylesheet" th:href="@{/assets/css/tables.css}" href="../../static/assets/css/tables.css">
    <link rel="stylesheet" th:href="@{/assets/css/responsive.css}" href="../../static/assets/css/responsive.css">
</head>

<body class="bg-light">

    <!-- Sidebar Fragment -->
    <div th:replace="~{admin/dashboard :: sidebar('subjects')}"></div>

    <!-- Top Navbar Fragment -->
    <div th:fragment="navbar" class="top-navbar">
        <div class="d-flex align-items-center">
            <i class="bi bi-list" id="sidebarToggle"></i>
            <h5 class="mb-0 ms-3 fw-semibold text-dark d-none d-md-block">Subject Management</h5>
        </div>
        <div class="dropdown">
            <a href="#" class="d-flex align-items-center text-decoration-none text-dark dropdown-toggle"
                id="adminProfileDropdown" data-bs-toggle="dropdown" aria-expanded="false">
                <img src="https://ui-avatars.com/api/?name=Admin+User&background=1E3A8A&color=fff"
                    class="rounded-circle me-2" width="40" height="40">
                <span class="d-none d-sm-inline fw-medium">Admin User</span>
            </a>
            <ul class="dropdown-menu dropdown-menu-end shadow border-0 mt-2">
                <li><a class="dropdown-item text-danger" href="../auth/index.html"><i
                            class="bi bi-box-arrow-right me-2"></i> Logout</a></li>
            </ul>
        </div>
    </div>

    <div class="main-content">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h3 class="fw-bold text-dark mb-1">Subject Masterlist</h3>
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb mb-0">
                        <li class="breadcrumb-item"><a href="subjects.html"
                                class="text-decoration-none text-muted">Home</a></li>
                        <li class="breadcrumb-item active">Subjects</li>
                    </ol>
                </nav>
            </div>
            <a th:href="@{/admin/subject-form}" href="subject-form.html"
                class="btn btn-primary shadow-sm rounded-3 px-3">
                <i class="bi bi-journal-plus me-2"></i> Add Subject
            </a>
        </div>

        <div class="table-wrapper">

            <div class="p-4 border-bottom bg-white d-flex justify-content-between align-items-center flex-wrap gap-3">
                <div class="input-group" style="max-width: 350px;">
                    <span class="input-group-text bg-white border-end-0 text-muted"><i class="bi bi-search"></i></span>
                    <input type="text" class="form-control border-start-0 table-search"
                        placeholder="Search code or title...">
                </div>
                <div class="d-flex gap-2">
                    <select class="form-select text-muted shadow-sm" id="currFilter" style="width: 200px;">
                        <option value="all">All Curricula</option>
                    </select>
                </div>
            </div>

            <div class="table-responsive">
                <table class="table table-custom mb-0" id="subjectTable">
                    <thead>
                        <tr>
                            <th>Code</th>
                            <th style="width: 40%;">Descriptive Title</th>
                            <th>Units</th>
                            <th>Target Curriculum</th>
                            <th class="text-end">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td colspan="5" class="text-center text-muted">Loading...</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="p-3 bg-white border-top d-flex justify-content-between align-items-center">
                <span class="text-muted small">Showing -- to -- of -- entries</span>
            </div>

        </div>
    </div>

    <div class="modal fade" id="logoutModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-sm">
            <div class="modal-content">
                <div class="modal-body text-center">
                    <div class="modal-icon-container icon-danger">
                        <i class="bi bi-box-arrow-right"></i>
                    </div>
                    <h4 class="fw-bold text-dark mb-2">Ready to Leave?</h4>
                    <p class="text-muted small mb-0">Select "Logout" below if you are ready to end your current session.
                    </p>
                </div>
                <div class="modal-footer d-flex justify-content-center border-0 pt-0 pb-4 bg-white">
                    <button type="button" class="btn btn-light border px-4 fw-medium text-muted"
                        data-bs-dismiss="modal">Cancel</button>
                    <a th:href="@{/logout}" href="../auth/index.html"
                        class="btn btn-danger px-4 fw-semibold shadow-sm">Logout</a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/assets/js/sidebar.js}" src="../../static/assets/js/sidebar.js"></script>
    <script>
        $(document).ready(function () {
            let subjectList = [];

            function loadSubjects() {
                $.ajax({
                    url: '/api/subject/all',
                    type: 'GET',
                    success: function (data) {
                        subjectList = data;
                        renderTable(subjectList);
                    }
                });
            }

            function renderTable(list) {
                const tbody = $('#subjectTable tbody');
                tbody.empty();

                if (list.length === 0) {
                    tbody.append('<tr><td colspan="5" class="text-center text-muted">No subject records found.</td></tr>');
                    $('.text-muted.small').text('Showing 0 to 0 of 0 entries');
                    return;
                }

                list.forEach(function (item) {
                    tbody.append(`
                        <tr>
                            <td class="fw-bold text-primary">${item.subjectCode}</td>
                            <td class="fw-semibold text-dark">${item.description}</td>
                            <td>${item.units} Units</td>
                            <td>${item.courseAssigned || 'General Education'}</td>
                            <td class="text-end">
                                <button class="btn-action btn-edit" title="Edit" onclick="location.href='/admin/subject-form.html?id=${item.id}'"><i class="bi bi-pencil-square"></i></button>
                                <button class="btn-action btn-delete btn-delete-subject" title="Delete" data-id="${item.id}"><i class="bi bi-trash-fill"></i></button>
                            </td>
                        </tr>
                    `);
                });

                $('.text-muted.small').text(`Showing 1 to ${list.length} of ${list.length} entries`);
            }

            function loadCurriculaDropdown() {
                $.ajax({
                    url: '/api/curriculum/all',
                    type: 'GET',
                    success: function(curricula) {
                        const select = $('#currFilter');
                        select.empty();
                        select.append('<option value="all">All Curricula</option>');
                        select.append('<option value="General Education">General Education</option>');
                        curricula.forEach(function(c) {
                            select.append(`<option value="${c.name}">${c.name}</option>`);
                        });
                    }
                });
            }

            // Search and Curriculum Filter
            function filterData() {
                const searchValue = $('.table-search').val().toLowerCase();
                const currValue = $('#currFilter').val().toLowerCase();

                const filtered = subjectList.filter(function (item) {
                    const matchesSearch = (item.subjectCode && item.subjectCode.toLowerCase().indexOf(searchValue) > -1) ||
                        (item.description && item.description.toLowerCase().indexOf(searchValue) > -1);

                    const matchesCurr = currValue === 'all' ||
                        (item.courseAssigned && item.courseAssigned.toLowerCase().indexOf(currValue) > -1);

                    return matchesSearch && matchesCurr;
                });

                renderTable(filtered);
            }

            $('.table-search').on('keyup', filterData);
            $('#currFilter').on('change', filterData);

            loadCurriculaDropdown();

            // Delete handler
            $(document).on('click', '.btn-delete-subject', function () {
                const id = $(this).data('id');
                if (confirm('Are you sure you want to delete this subject?')) {
                    $.ajax({
                        url: '/api/subject/delete/' + id,
                        type: 'DELETE',
                        success: function () {
                            alert('Subject deleted successfully.');
                            loadSubjects();
                        },
                        error: function () {
                            alert('Error deleting subject.');
                        }
                    });
                }
            });

            loadSubjects();
        });
    </script>
</body>

</html>
