<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Student Information System</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" th:href="@{/assets/css/variables.css}" href="../../static/assets/css/variables.css">
    <link rel="stylesheet" th:href="@{/assets/css/global.css}" href="../../static/assets/css/global.css">
    <link rel="stylesheet" th:href="@{/assets/css/auth.css}" href="../../static/assets/css/auth.css">
</head>
<body class="auth-body">

    <div class="auth-split-card">
        <div class="row g-0">
            <div class="col-12 col-md-6 p-4 p-sm-5 d-flex flex-column justify-content-center">
                <div class="text-center mb-4">
                    <img th:src="@{/LINAWSIS.png}" src="../../static/LINAWSIS.png" alt="Linawan Logo" class="auth-logo mx-auto">
                    <h5 id="loginTitle" class="fw-semibold text-dark">System Login</h5>
                </div>

                <form id="loginForm" onsubmit="event.preventDefault();">
                    <div class="mb-3 auth-input-group">
                        <label for="username" class="auth-label">Username</label>
                        <input type="text" class="form-control" id="username" name="username" placeholder="Enter Username" required autofocus>
                    </div>

                    <div class="mb-4 auth-input-group">
                        <div class="d-flex justify-content-between align-items-center">
                            <label for="password" class="auth-label">Password</label>
                            <a th:href="@{/auth/forgot-password}" href="forgot-password.html" class="text-decoration-none small text-muted">Forgot Password?</a>
                        </div>
                        <div class="input-group">
                            <input type="password" class="form-control border-end-0" id="password" name="password" placeholder="Enter Password" style="border-top-left-radius:10px; border-bottom-left-radius:10px; border-top-right-radius:0; border-bottom-right-radius:0;" required>
                            <button class="btn btn-outline-secondary border-0 bg-light text-muted" type="button" id="togglePassword" style="border-top-left-radius:0; border-bottom-left-radius:0; border-top-right-radius:10px; border-bottom-right-radius:10px; border: none; background-color: #e9ecef !important;">
                                <i class="bi bi-eye-slash" id="toggleIcon"></i>
                            </button>
                        </div>
                    </div>

                    <button type="submit" class="btn-green-auth">
                        Log In
                    </button>
                    
                    <a th:href="@{/auth/index}" href="index.html" class="text-decoration-none text-muted small d-block text-center mt-3">
                        <i class="bi bi-arrow-left me-1"></i> Back to Role Selection
                    </a>
                </form>
            </div>
            
            <div class="col-12 col-md-6 d-none d-md-block">
                <div class="auth-split-right h-100"></div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/assets/js/auth.js}" src="../../static/assets/js/auth.js"></script>
</body>
</html>
