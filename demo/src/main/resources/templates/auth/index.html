<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome | Student Information System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/assets/css/variables.css}" href="../../static/assets/css/variables.css">
    <link rel="stylesheet" th:href="@{/assets/css/global.css}" href="../../static/assets/css/global.css">
    <link rel="stylesheet" th:href="@{/assets/css/auth.css}" href="../../static/assets/css/auth.css">
</head>

<body class="auth-body">

    <div class="auth-card p-4 p-sm-5 text-center">
        <img th:src="@{/LINAWSIS.png}" src="../../static/LINAWSIS.png" alt="Linawan Logo" class="auth-logo mx-auto">
        <h4 class="fw-bold text-dark mb-1">Welcome, Linawan!</h4>
        <p class="text-muted small mb-4">Sign in as:</p>

        <div class="d-flex flex-column gap-2">
            <a th:href="@{/auth/login(role='admin')}" href="login.html?role=admin" class="btn-green-auth">Admin</a>
            <a th:href="@{/auth/login(role='faculty')}" href="login.html?role=faculty"
                class="btn-green-auth">Faculty</a>
            <a th:href="@{/auth/login(role='student')}" href="login.html?role=student"
                class="btn-green-auth">Student</a>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
