<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | Student Information System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/assets/css/variables.css}" href="../../static/assets/css/variables.css">
    <link rel="stylesheet" th:href="@{/assets/css/global.css}" href="../../static/assets/css/global.css">
    <link rel="stylesheet" th:href="@{/assets/css/auth.css}" href="../../static/assets/css/auth.css">
</head>

<body class="auth-body">

    <div class="auth-card forgot-card p-4 p-sm-5">
        <div class="text-center mb-4">

            <h5 class="fw-semibold text-dark">Reset Password</h5>
            <p class="text-muted small">Validate credentials to set a new password</p>
        </div>

        <form id="forgotPasswordForm" onsubmit="event.preventDefault();">
            <div class="mb-2 auth-input-group">
                <label for="username" class="auth-label">Username</label>
                <input type="text" class="form-control" id="username" name="username" placeholder="Enter Username"
                    required autofocus>
            </div>

            <div class="mb-2 auth-input-group">
                <label for="email" class="auth-label">Registered Email</label>
                <input type="email" class="form-control" id="email" name="email" placeholder="Enter Registered Email"
                    required>
            </div>

            <div class="mb-2 auth-input-group">
                <label for="role" class="auth-label">User Role</label>
                <select class="form-select" id="role" name="role" required>
                    <option value="" selected disabled>Select your role...</option>
                    <option value="ADMIN">Administrator</option>
                    <option value="FACULTY">Faculty Member</option>
                    <option value="STUDENT">Student</option>
                </select>
            </div>

            <div class="mb-2 auth-input-group">
                <label for="newPassword" class="auth-label">New Password</label>
                <input type="password" class="form-control" id="newPassword" name="newPassword"
                    placeholder="Enter New Password" required>
            </div>

            <div class="mb-4 auth-input-group">
                <label for="confirmPassword" class="auth-label">Confirm New Password</label>
                <input type="password" class="form-control" id="confirmPassword" name="confirmPassword"
                    placeholder="Confirm New Password" required>
            </div>

            <button type="submit" class="btn-green-auth">
                Reset Password
            </button>

            <a th:href="@{/auth/login}" href="login.html"
                class="text-decoration-none text-muted small d-block text-center mt-2">
                <i class="bi bi-arrow-left me-1"></i> Back to Login
            </a>
        </form>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const form = document.getElementById('forgotPasswordForm');
            if (form) {
                form.addEventListener('submit', function (e) {
                    e.preventDefault();

                    const username = document.getElementById('username').value;
                    const email = document.getElementById('email').value;
                    const role = document.getElementById('role').value;
                    const newPassword = document.getElementById('newPassword').value;
                    const confirmPassword = document.getElementById('confirmPassword').value;

                    if (newPassword !== confirmPassword) {
                        alert('New password and confirm password do not match.');
                        return;
                    }

                    fetch('/api/forgot-password', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            username: username,
                            email: email,
                            role: role,
                            newPassword: newPassword
                        })
                    })
                        .then(response => {
                            if (response.ok) {
                                return response.json();
                            } else {
                                return response.json().then(err => {
                                    throw new Error(err.message || 'Failed to reset password.');
                                }).catch(() => {
                                    throw new Error('Reset failed. Please verify your credentials.');
                                });
                            }
                        })
                        .then(data => {
                            alert(data.message || 'Password reset successfully.');
                            window.location.href = '/auth/login?role=' + role.toLowerCase();
                        })
                        .catch(error => {
                            alert(error.message);
                        });
                });
            }
        });
    </script>
</body>

</html>
